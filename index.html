<script>
async function upload(){

let name = document.getElementById("name").value;
let file = document.getElementById("file").files[0];

if(!name || !file){
    alert("⚠️ المشكلة: بيانات ناقصة\n\n✅ الحل: اكتب الاسم واختر ملف PDF");
    return;
}

// تحقق نوع الملف
if(file.type !== "application/pdf"){
    alert("⚠️ المشكلة: الملف ليس PDF\n\n✅ الحل: اختر ملف بصيغة PDF فقط");
    return;
}

let formData = new FormData();
formData.append("file", file);
formData.append("upload_preset", PRESET);
formData.append("resource_type", "auto");

try{

let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
method:"POST",
body:formData
});

let data = await res.json();

// 🔥 تحليل الخطأ
if(!res.ok){

let msg = data.error?.message || "";

// تحليل ذكي
if(msg.includes("preset")){
    alert("❌ المشكلة: Upload Preset غير صحيح\n\n✅ الحل:\nاذهب إلى Cloudinary → Settings → Upload\nوتأكد أن preset اسمه (tahamm) ومفعل unsigned");
}
else if(msg.includes("cloud_name")){
    alert("❌ المشكلة: Cloud Name خطأ\n\n✅ الحل: تأكد من اسم الحساب في Cloudinary");
}
else if(msg.includes("File size")){
    alert("❌ المشكلة: الملف كبير جدًا\n\n✅ الحل: قلل حجم الملف أو ارفع الحد من Cloudinary");
}
else{
    alert("❌ خطأ من Cloudinary:\n" + msg);
}

return;
}

// حفظ Firebase
await db.ref("files").push({
name:name,
url:data.secure_url
});

alert("✅ تم الرفع بنجاح");

document.getElementById("name").value="";
document.getElementById("file").value="";

}catch(e){

// 🔥 تحليل أخطاء الشبكة
if(e.message.includes("Failed to fetch")){
    alert("❌ المشكلة: لا يوجد اتصال أو خطأ CORS\n\n✅ الحل:\n- تأكد من الإنترنت\n- أو جرب من متصفح Chrome\n- أو تأكد أن الموقع HTTPS");
}
else{
    alert("❌ خطأ غير متوقع:\n" + e.message);
}

}
}
</script>
