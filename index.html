<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة العمليات | شركة محمد طه</title>
    <style>
        :root {
            --primary-color: #1e3a8a; /* أزرق ملكي مهني */
            --secondary-color: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #1e293b; user-select: none; }
        .dashboard { max-width: 1100px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        
        /* الهيدر */
        .header-bar { background: var(--primary-color); color: white; padding: 20px; text-align: center; }
        .header-bar h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }

        /* لوحة الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; background: #fff; border-bottom: 1px solid #e2e8f0; }
        .stat-card { padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #e2e8f0; }
        .stat-card span { display: block; font-size: 20px; font-weight: bold; }

        /* منطقة الإدخال المهنية */
        .action-area { padding: 20px; background: #f1f5f9; display: flex; gap: 10px; flex-wrap: wrap; }
        .input-field { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-main { background: var(--primary-color); color: white; }
        .btn-main:hover { background: #1e40af; }

        /* التبويبات */
        .tab-container { padding: 0 20px; background: #fff; display: flex; border-bottom: 2px solid #f1f5f9; }
        .tab { padding: 15px 25px; cursor: pointer; color: var(--secondary-color); font-weight: 500; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); background: #f8fafc; }

        /* الجدول المهني */
        .table-wrapper { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8fafc; padding: 15px; text-align: center; font-size: 13px; text-transform: uppercase; color: var(--secondary-color); border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        .badge { padding: 6px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .bg-pending { background: #fef3c7; color: #92400e; }
        .bg-success { background: #d1fae5; color: #065f46; }
        
        .delete-icon { color: var(--danger); cursor: pointer; font-size: 18px; border: none; background: none; }
        .delete-icon:hover { transform: scale(1.2); }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="dashboard">
    <div class="header-bar">
        <h1>شركة محمد طه لإدارة الخدمات</h1>
        <small>نظام الأرشفة والطباعة المركزي - نسخة 2026</small>
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="border-top: 4px solid var(--primary-color);">
            <p>إجمالي المعاملات</p>
            <span id="totalCount">0</span>
        </div>
        <div class="stat-card" style="border-top: 4px solid var(--warning);">
            <p>قيد التجهيز</p>
            <span id="pendingCount">0</span>
        </div>
        <div class="stat-card" style="border-top: 4px solid var(--success);">
            <p>تمت الطباعة</p>
            <span id="doneCount">0</span>
        </div>
    </div>

    <div class="action-area">
        <input type="text" id="client" class="input-field" placeholder="اسم العميل الكامل">
        <input type="text" id="file" class="input-field" placeholder="وصف الملف (مثلاً: فاتورة ضريبية)">
        <button class="btn btn-main" onclick="addEntry()">إضافة للسجل</button>
    </div>

    <div class="tab-container">
        <div class="tab active" onclick="filterData('all', this)">كل السجلات</div>
        <div class="tab" onclick="filterData('pending', this)">بانتظار الطباعة</div>
        <div class="tab" onclick="filterData('done', this)">سجل المطبوعات</div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>توقيت الطلب</th>
                    <th>اسم العميل</th>
                    <th>مسمى الملف</th>
                    <th>الحالة التشغيلية</th>
                    <th>الإجراء</th>
                </tr>
            </thead>
            <tbody id="masterTable">
                </tbody>
        </table>
    </div>
</div>

<script>
    let entries = [];
    const _SYS_KEY = "MT-1998";

    function addEntry() {
        const client = document.getElementById('client').value;
        const file = document.getElementById('file').value;
        
        if (!client || !file) {
            alert("تنبيه مهني: يرجى استكمال بيانات العميل والملف.");
            return;
        }

        const newEntry = {
            id: entries.length + 1,
            time: new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'}),
            date: new Date().toLocaleDateString('ar-EG'),
            client: client,
            file: file,
            status: 'pending'
        };

        entries.unshift(newEntry);
        updateUI();
        document.getElementById('client').value = '';
        document.getElementById('file').value = '';
    }

    function updateUI() {
        const tbody = document.getElementById('masterTable');
        tbody.innerHTML = '';

        entries.forEach(item => {
            const row = document.createElement('tr');
            row.setAttribute('data-id', item.id);
            row.innerHTML = `
                <td>#${item.id}</td>
                <td><small>${item.date}<br>${item.time}</small></td>
                <td><strong>${item.client}</strong></td>
                <td>📄 ${item.file}</td>
                <td>
                    <span class="badge ${item.status === 'pending' ? 'bg-pending' : 'bg-success'}" 
                          onclick="toggleEntryStatus(${item.id})">
                        ${item.status === 'pending' ? 'قيد التجهيز' : 'تمت الطباعة'}
                    </span>
                </td>
                <td><button class="delete-icon" onclick="removeEntry(${item.id})">🗑</button></td>
            `;
            tbody.appendChild(row);
        });

        // تحديث العدادات
        document.getElementById('totalCount').innerText = entries.length;
        document.getElementById('pendingCount').innerText = entries.filter(e => e.status === 'pending').length;
        document.getElementById('doneCount').innerText = entries.filter(e => e.status === 'done').length;
    }

    function toggleEntryStatus(id) {
        const item = entries.find(e => e.id === id);
        if (item) {
            item.status = item.status === 'pending' ? 'done' : 'pending';
            updateUI();
        }
    }

    function removeEntry(id) {
        if(confirm("إجراء إداري: هل أنت متأكد من حذف هذا السجل؟")) {
            entries = entries.filter(e => e.id !== id);
            updateUI();
        }
    }

    function filterData(status, tabEl) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tabEl.classList.add('active');
        
        const rows = document.querySelectorAll('#masterTable tr');
        rows.forEach(row => {
            const id = parseInt(row.getAttribute('data-id'));
            const item = entries.find(e => e.id === id);
            if (status === 'all' || item.status === status) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    }

    // منع اختصارات المطورين
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.keyCode == 85)) return false;
    };
</script>

</body>
</html>
