<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة محمد طه لإدارة الخدمات - النظام السحابي</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        :root { --primary: #1e3a8a; --bg: #f8fafc; --success: #10b981; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; direction: rtl; }
        .dashboard { max-width: 1100px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header-bar { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; border-bottom: 1px solid #eee; }
        .stat-card { padding: 10px; text-align: center; border-radius: 8px; border: 1px solid #e2e8f0; border-top: 3px solid var(--primary); }
        .stat-card span { display: block; font-size: 20px; font-weight: bold; }
        .action-area { padding: 15px; background: #f1f5f9; display: flex; flex-wrap: wrap; gap: 10px; }
        .input-field { flex: 2; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; }
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #f1f5f9; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .badge { padding: 5px 10px; border-radius: 50px; font-size: 11px; cursor: pointer; }
        .bg-pending { background: #fef3c7; color: #92400e; }
        .bg-success { background: #d1fae5; color: #065f46; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="dashboard">
    <div class="header-bar">
        <h1>شركة محمد طه لإدارة الخدمات</h1>
        <p>النظام السحابي الموحد - الحفظ التلقائي مفعل ✅</p>
    </div>

    <div class="stats">
        <div class="stat-card"> <p>إجمالي المعاملات</p><span id="total">0</span> </div>
        <div class="stat-card" style="border-top-color: var(--warning);"> <p>قيد التجهيز</p><span id="pending">0</span> </div>
        <div class="stat-card" style="border-top-color: var(--success);"> <p>تمت الطباعة</p><span id="done">0</span> </div>
    </div>

    <div class="action-area no-print">
        <input type="text" id="clientName" class="input-field" placeholder="اسم العميل الكامل">
        <input type="file" id="fileInput" style="display:none" onchange="document.getElementById('fileLabel').innerText=this.files[0].name">
        <button class="btn" style="background:#64748b; color:white;" onclick="document.getElementById('fileInput').click()">📎 <span id="fileLabel">ارفق ملف PDF</span></button>
        <button id="addBtn" class="btn btn-main" onclick="uploadAndAdd()">🚀 تنفيذ الطلب</button>
        <input type="text" id="search" style="width:100%; padding:8px;" onkeyup="filterTable()" placeholder="🔍 ابحث هنا...">
    </div>

    <div class="table-wrapper" style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>اسم العميل</th>
                    <th>الملف المرفوع</th>
                    <th>الحالة</th>
                    <th>ملاحظات</th>
                    <th class="no-print">إجراءات</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك ✅
    const firebaseConfig = {
        apiKey: "AIzaSyAYJwvrBLc_svZ2icW8zrBbKrFyg1METn0",
        authDomain: "store-project-b023e.firebaseapp.com",
        projectId: "store-project-b023e",
        storageBucket: "store-project-b023e.firebasestorage.app",
        messagingSenderId: "561530737705",
        appId: "1:561530737705:web:beefb32c081f9bf8b53838"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // رفع الملف وإضافة البيانات سحابياً
    async function uploadAndAdd() {
        const name = document.getElementById('clientName').value;
        const file = document.getElementById('fileInput').files[0];
        const btn = document.getElementById('addBtn');

        if(!name || !file) return alert("أكمل البيانات");

        btn.innerText = "جاري الرفع...";
        btn.disabled = true;

        try {
            // 1. رفع الملف لـ Firebase Storage
            const fileRef = storage.ref('files/' + Date.now() + "_" + file.name);
            await fileRef.put(file);
            const fileURL = await fileRef.getDownloadURL();

            // 2. حفظ البيانات في Firestore
            await db.collection('orders').add({
                client: name,
                fileName: file.name,
                fileURL: fileURL,
                status: 'pending',
                note: '',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('clientName').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('fileLabel').innerText = "ارفق ملف PDF";
        } catch (e) { alert("خطأ في الرفع: " + e.message); }
        btn.innerText = "🚀 تنفيذ الطلب";
        btn.disabled = false;
    }

    // جلب البيانات لحظياً (Real-time Sync)
    db.collection('orders').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        let t=0, p=0, d=0;

        snapshot.forEach(doc => {
            const o = doc.data();
            t++; o.status === 'pending' ? p++ : d++;
            tbody.innerHTML += `
                <tr>
                    <td><strong>${o.client}</strong></td>
                    <td>
                        <button onclick="window.open('${o.fileURL}')">👁️ فتح</button>
                        <button onclick="printPdf('${o.fileURL}')">🖨️ طباعة</button>
                    </td>
                    <td><span class="badge ${o.status==='pending'?'bg-pending':'bg-success'}" onclick="updateStatus('${doc.id}', '${o.status}')">${o.status==='pending'?'قيد التجهيز':'تمت الطباعة'}</span></td>
                    <td><input type="text" value="${o.note}" onchange="updateNote('${doc.id}', this.value)" style="border:none; border-bottom:1px solid #ddd; width:80px;"></td>
                    <td class="no-print"><button onclick="deleteDoc('${doc.id}')">🗑️</button></td>
                </tr>
            `;
        });
        document.getElementById('total').innerText = t;
        document.getElementById('pending').innerText = p;
        document.getElementById('done').innerText = d;
    });

    function updateStatus(id, current) {
        db.collection('orders').doc(id).update({ status: current === 'pending' ? 'done' : 'pending' });
    }

    function updateNote(id, val) {
        db.collection('orders').doc(id).update({ note: val });
    }

    function deleteDoc(id) {
        if(confirm("حذف الطلب نهائياً؟")) db.collection('orders').doc(id).delete();
    }

    function printPdf(url) {
        const win = window.open(url);
        win.onload = () => win.print();
    }

    function filterTable() {
        let v = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('#tableBody tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(v) ? '' : 'none';
        });
    }
</script>
</body>
</html>
