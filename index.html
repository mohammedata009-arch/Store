<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار الإنجليزية التفاعلي 2060 - إدارة محمد طه عطا</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@400;700&display=swap');

:root{
--neon-blue:#00d2ff;
--neon-purple:#9d50bb;
--dark-space:#0b0e14;
--success-green:#10b981;
}

body{
margin:0;
background:var(--dark-space);
color:white;
font-family:'Cairo',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

.platform-header{
width:100%;
background:linear-gradient(90deg,#1e3a8a,#9d50bb);
padding:20px;
text-align:center;
border-bottom:2px solid var(--neon-blue);
}

.quiz-container{
width:90%;
max-width:600px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
margin:40px 0;
padding:30px;
border-radius:25px;
border:1px solid rgba(0,210,255,0.3);
text-align:center;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--neon-blue);
background:rgba(0,0,0,0.3);
color:white;
font-size:18px;
margin-top:10px;
}

.option-btn{
background:rgba(255,255,255,0.1);
border:1px solid var(--neon-blue);
color:white;
padding:15px;
border-radius:15px;
cursor:pointer;
font-size:18px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
width:100%;
}

.option-btn:hover{
background:rgba(0,210,255,0.2);
}

.correct{background:var(--success-green)!important;}
.wrong{background:#ef4444!important;}

.whatsapp-btn{
background:#25D366;
color:white;
border:none;
padding:15px 30px;
border-radius:50px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

.progress-bar{
width:100%;
height:8px;
background:#222;
border-radius:4px;
margin-bottom:20px;
overflow:hidden;
}

#progress-fill{
width:0%;
height:100%;
background:var(--neon-blue);
}

</style>
</head>

<body>

<div class="platform-header">
<h2>منصة البرامج التخصصية</h2>
<p>إدارة: محمد طه عطا</p>
</div>

<div class="quiz-container" id="setup-screen">

<h2 style="color:var(--neon-blue)">مرحباً بالمتدربين</h2>

<label>اكتب اسمك:</label>
<input type="text" id="user-name" placeholder="ادخل الاسم هنا">

<button class="whatsapp-btn" style="background:var(--neon-blue);color:black" onclick="startQuiz()">
بدء الاختبار
</button>

</div>


<div class="quiz-container" id="quiz-screen" style="display:none">

<div class="progress-bar">
<div id="progress-fill"></div>
</div>

<p id="q-info"></p>
<h2 id="q-text"></h2>

<div id="options-container"></div>

</div>


<div class="quiz-container" id="result-screen" style="display:none">

<h2 id="result-title"></h2>

<div style="font-size:50px;font-family:Orbitron;color:var(--neon-blue)" id="score-display">
0/10
</div>

<p id="result-desc"></p>

<button class="whatsapp-btn" id="send-wa">
إرسال النتيجة للأستاذ
</button>

<br>

<button onclick="location.reload()" style="margin-top:15px">
إعادة المحاولة
</button>

</div>

<script>

const questions=[

{q:"لتحية شخص نقول:",opts:["Hi","Pizza","Laptop"],ans:0},

{q:"كيف تعرف نفسك بالإنجليزية؟",opts:["I am","I pizza","I coffee"],ans:0},

{q:"ما معنى Phone ؟",opts:["هاتف","كتاب","باب"],ans:0},

{q:"أكمل الجملة: I ____ Coffee",opts:["like","am","is"],ans:0},

{q:"Laptop تعني:",opts:["هاتف","حاسوب محمول","سيارة"],ans:1},

{q:"عند لقاء شخص جديد نقول:",opts:["Nice to meet you","Coffee please","Laptop hi"],ans:0},

{q:"Pizza تعتبر:",opts:["طعام","تكنولوجيا","رياضة"],ans:0},

{q:"كيف تقول أنا أحب الهاتف؟",opts:["I like phone","Phone like me","I am phone"],ans:0},

{q:"كلمة I تعني:",opts:["أنا","أنت","نحن"],ans:0},

{q:"أي كلمة تعني قهوة؟",opts:["Coffee","Pizza","Phone"],ans:0}

];

let current=0;
let score=0;
let userName="";

function startQuiz(){

userName=document.getElementById("user-name").value;

if(!userName){
alert("ادخل الاسم");
return;
}

document.getElementById("setup-screen").style.display="none";
document.getElementById("quiz-screen").style.display="block";

showQuestion();

}

function showQuestion(){

let q=questions[current];

document.getElementById("q-info").innerText=
"السؤال "+(current+1)+" من "+questions.length;

document.getElementById("q-text").innerText=q.q;

document.getElementById("progress-fill").style.width=
((current/questions.length)*100)+"%";

let container=document.getElementById("options-container");
container.innerHTML="";

q.opts.forEach((opt,index)=>{

let btn=document.createElement("button");

btn.className="option-btn";

btn.innerHTML=
"<span>"+opt+"</span> <span onclick='speak(\""+opt+"\")'>🔊</span>";

btn.onclick=()=>check(index,btn);

container.appendChild(btn);

});

}

function speak(word){

let speech=new SpeechSynthesisUtterance(word);
speech.lang="en-US";
speech.rate=0.9;
speechSynthesis.speak(speech);

}

function check(index,btn){

let correct=questions[current].ans;

let buttons=document.querySelectorAll(".option-btn");

if(index===correct){

btn.classList.add("correct");
score++;

}else{

btn.classList.add("wrong");
buttons[correct].classList.add("correct");

}

setTimeout(()=>{

current++;

if(current<questions.length){

showQuestion();

}else{

showResults();

}

},1000);

}

function showResults(){

document.getElementById("quiz-screen").style.display="none";
document.getElementById("result-screen").style.display="block";

document.getElementById("score-display").innerText=
score+"/"+questions.length;

let title=document.getElementById("result-title");
let desc=document.getElementById("result-desc");

if(score>=8){

title.innerText="ممتاز!";
desc.innerText="نتيجة رائعة في اختبار الإنجليزية.";

}else{

title.innerText="جيد";
desc.innerText="حاول مرة أخرى لتحسين مستواك.";

}

document.getElementById("send-wa").onclick=function(){

let phone="0901946410";

let text=
"*نتيجة اختبار الإنجليزية*%0A"+
"الاسم: "+userName+"%0A"+
"النتيجة: "+score+"/"+questions.length;

window.open("https://wa.me/"+phone+"?text="+text);

};

}

</script>

</body>
</html>
