<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة الخدمات - فحص الأخطاء</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f5f9; padding: 20px; direction: rtl; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .status-box { padding: 10px; margin-bottom: 20px; border-radius: 8px; font-weight: bold; text-align: center; display: none; }
        .error { background: #fee2e2; color: #b91c1c; display: block; }
        .success { background: #dcfce7; color: #15803d; display: block; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: #1e3a8a; color: white; border: none; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام إدارة الخدمات والطباعة</h2>
    <p>أيها المتدربون، هذا الإصدار يحتوي على نظام "كشف الأعطال"</p>
    
    <div id="statusMsg" class="status-box"></div>

    <input type="text" id="clientName" placeholder="اسم العميل المستلم...">
    <input type="file" id="fileInput" accept="application/pdf">
    <button id="uploadBtn" class="btn-main" onclick="startProfessionalUpload()">🚀 رفع ومعالجة الملف</button>

    <table id="dataTable" style="width: 100%; margin-top: 20px; border-collapse: collapse;">
        <thead>
            <tr style="background: #f8fafc;">
                <th>العميل</th>
                <th>المعاينة</th>
                <th>الإجراء</th>
            </tr>
        </thead>
        <tbody id="listBody"></tbody>
    </table>
</div>

<script>
    // إعدادات Firebase الخاصة بكم
    const firebaseConfig = {
        apiKey: "AIzaSyAYJwvrBLc_svZ2icW8zrBbKrFyg1METn0",
        authDomain: "store-project-b023e.firebaseapp.com",
        databaseURL: "https://store-project-b023e-default-rtdb.firebaseio.com",
        projectId: "store-project-b023e",
        appId: "1:561530737705:web:beefb32c081f9bf8b53838"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // إعدادات Cloudinary بناءً على صوركم
    const CLOUD_NAME = "djygvtpb2";
    const UPLOAD_PRESET = "tahamm";

    async function startProfessionalUpload() {
        const file = document.getElementById('fileInput').files[0];
        const name = document.getElementById('clientName').value;
        const msg = document.getElementById('statusMsg');
        const btn = document.getElementById('uploadBtn');

        if (!file || !name) {
            showStatus("يرجى إكمال البيانات أيها المتدربون", "error");
            return;
        }

        btn.disabled = true;
        showStatus("جاري الرفع... يرجى الانتظار", "success");

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        // هذا السطر يحل مشكلة ERR_INVALID_RESPONSE في الـ PDF
        formData.append('resource_type', 'auto'); 

        try {
            // المرحلة الأولى: الرفع إلى Cloudinary
            const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                method: 'POST',
                body: formData
            });
            const cloudData = await cloudRes.json();

            if (!cloudRes.ok) {
                throw new Error("خطأ في Cloudinary: " + (cloudData.error.message || "فشل الرفع"));
            }

            // المرحلة الثانية: الحفظ في Firebase
            await db.ref('orders').push({
                client: name,
                fileURL: cloudData.secure_url,
                time: new Date().toLocaleTimeString()
            });

            showStatus("تمت العملية بنجاح تام أيها المتدربون", "success");
            document.getElementById('fileInput').value = '';
            document.getElementById('clientName').value = '';

        } catch (err) {
            showStatus("عذراً: " + err.message, "error");
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    }

    function showStatus(text, type) {
        const msg = document.getElementById('statusMsg');
        msg.innerText = text;
        msg.className = "status-box " + type;
        msg.style.display = "block";
    }

    // عرض البيانات من قاعدة البيانات
    db.ref('orders').on('value', snap => {
        const tbody = document.getElementById('listBody');
        tbody.innerHTML = '';
        snap.forEach(child => {
            const data = child.val();
            tbody.innerHTML += `
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding:10px;">${data.client}</td>
                    <td><a href="${data.fileURL}" target="_blank" style="color:#2563eb;">👁️ فتح</a></td>
                    <td><button onclick="db.ref('orders/${child.key}').remove()" style="color:red; border:none; background:none; cursor:pointer;">🗑️</button></td>
                </tr>`;
        });
    });
</script>
</body>
</html>
