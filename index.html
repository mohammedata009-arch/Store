<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المتدربين - مركز رفع الملفات</title>
    <style>
        :root { --primary: #3ecf8e; --dark: #1c1c1c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .upload-card { background: #f9fffb; border: 2px dashed var(--primary); padding: 30px; text-align: center; border-radius: 10px; margin-bottom: 30px; }
        input[type="file"] { margin-bottom: 20px; display: block; width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 5px; background: white; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #34b27b; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #fileList { list-style: none; padding: 0; margin-top: 20px; }
        .file-item { background: white; border: 1px solid #eee; margin-bottom: 10px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .download-btn { background: #007bff; color: white; text-decoration: none; padding: 8px 15px; border-radius: 4px; font-size: 13px; font-weight: bold; }
        #status { margin-top: 15px; font-size: 14px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>منصة المتدربين لتبادل ملفات PDF</h2>
    
    <div class="upload-card">
        <p>اختر ملف PDF لرفعه للمنصة:</p>
        <input type="file" id="pdfFile" accept=".pdf">
        <button id="uploadBtn" onclick="uploadFile()">رفع الملف الآن</button>
        <div id="status"></div>
    </div>

    <h3>قائمة الملفات المرفوعة:</h3>
    <div id="fileList">جاري جلب الملفات...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // بيانات مشروعك المأخوذة من الصور التي أرسلتها
    const SUPABASE_URL = 'https://hsqslvtoofhcuzxmswkh.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzcXNsdnRvb2ZoY3V6eG1zd2toIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTI3NzYsImV4cCI6MjA4OTM2ODc3Nn0.aHYycJNUXk4arZc0ktvbwcjT4kfwF-enUxnDsQr0S3M'; 

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadFiles() {
        const listDiv = document.getElementById('fileList');
        const { data, error } = await supabaseClient.storage.from('pdfs').list('', {
            sortBy: { column: 'created_at', order: 'desc' }
        });

        if (error) {
            listDiv.innerHTML = "<span style='color:red'>خطأ في الاتصال بالسحابة.</span>";
            return;
        }

        if (data.length === 0) {
            listDiv.innerHTML = "لا توجد ملفات مرفوعة حالياً.";
            return;
        }

        listDiv.innerHTML = '';
        data.forEach(file => {
            const { data: urlData } = supabaseClient.storage.from('pdfs').getPublicUrl(file.name);
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
                <div style="padding:10px">📄 ${file.name}</div>
                <div style="padding:10px"><a href="${urlData.publicUrl}" target="_blank" class="download-btn">عرض / تحميل</a></div>
            `;
            listDiv.appendChild(item);
        });
    }

    async function uploadFile() {
        const fileInput = document.getElementById('pdfFile');
        const btn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const file = fileInput.files[0];

        if (!file) return alert("الرجاء اختيار ملف أولاً");

        btn.disabled = true;
        status.style.color = "blue";
        status.innerText = "جاري الرفع... يرجى الانتظار";

        // اسم الملف المرفوع
        const fileName = `${Date.now()}_${file.name}`;
        
        const { data, error } = await supabaseClient.storage.from('pdfs').upload(fileName, file);

        if (error) {
            status.style.color = "red";
            status.innerText = "فشل الرفع: " + error.message;
        } else {
            status.style.color = "green";
            status.innerText = "تم الرفع بنجاح!";
            loadFiles(); // تحديث القائمة
        }
        btn.disabled = false;
        fileInput.value = '';
    }

    window.onload = loadFiles;
</script>

</body>
</html>
