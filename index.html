<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المتدربين لرفع الملفات</title>
    <style>
        :root { --main-color: #3ecf8e; --bg-color: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-color); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .upload-section { border: 2px dashed var(--main-color); padding: 20px; text-align: center; border-radius: 8px; background: #f9fffb; margin-bottom: 25px; }
        button { background: var(--main-color); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:disabled { background: #ccc; }
        #fileList { list-style: none; padding: 0; margin-top: 20px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 5px; border-radius: 4px; }
        .file-item a { color: #007bff; text-decoration: none; font-weight: bold; }
        #status { font-size: 14px; margin-top: 10px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>مركز رفع ملفات المتدربين</h2>
    
    <div class="upload-section">
        <input type="file" id="pdfFile" accept=".pdf">
        <button id="uploadBtn" onclick="uploadFile()">رفع الملف الآن</button>
        <div id="status"></div>
    </div>

    <h3>الملفات المتاحة للجميع:</h3>
    <div id="fileList">جاري تحميل القائمة...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // بيانات مشروعك (استبدل المفتاح العام فقط)
    const SUPABASE_URL = 'https://hsqslvtoofhcuzxmswkh.supabase.co';
    const SUPABASE_KEY = 'ضـع_مفـتاح_ANON_الخاص_بـك_هنـا'; 

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // دالة لجلب الملفات وعرضها عند فتح الصفحة
    async function loadFiles() {
        const { data, error } = await supabase.storage.from('pdfs').list();
        const listDiv = document.getElementById('fileList');
        
        if (error) {
            listDiv.innerHTML = "خطأ في جلب الملفات. تأكد من إعداد الـ Policies.";
            return;
        }

        if (data.length === 0) {
            listDiv.innerHTML = "لا توجد ملفات مرفوعة حالياً.";
            return;
        }

        listDiv.innerHTML = '';
        data.forEach(file => {
            const { data: urlData } = supabase.storage.from('pdfs').getPublicUrl(file.name);
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
                <span>${file.name}</span>
                <a href="${urlData.publicUrl}" target="_blank">تحميل PDF</a>
            `;
            listDiv.appendChild(item);
        });
    }

    // دالة الرفع
    async function uploadFile() {
        const fileInput = document.getElementById('pdfFile');
        const btn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const file = fileInput.files[0];

        if (!file) return alert("الرجاء اختيار ملف أولاً");

        btn.disabled = true;
        status.innerText = "جاري الرفع... يرجى الانتظار";

        // الرفع لمجلد pdfs
        const { data, error } = await supabase.storage
            .from('pdfs')
            .upload(`${Date.now()}_${file.name}`, file);

        if (error) {
            alert("فشل الرفع: " + error.message);
        } else {
            status.innerText = "تم الرفع بنجاح!";
            loadFiles(); // تحديث القائمة فوراً
        }
        btn.disabled = false;
        fileInput.value = '';
    }

    // تشغيل الجلب عند فتح الصفحة
    loadFiles();
</script>

</body>
</html>
